name: "Dynamic Resume Builder & Deploy"

on:
  workflow_dispatch:
    inputs:
      resume_file:
        description: 'Selecciona la variante de CV a compilar'
        required: true
        default: 'JosephNaranjo_Software_FullStack.tex'
        type: choice
        options:
          - JosephNaranjo_AI_Data_Engineer.tex
          - JosephNaranjo_Electronics_Automation.tex
          - JosephNaranjo_Software_FullStack.tex
          - ALL

jobs:
  build_and_send:
    runs-on: ubuntu-latest
    
    # IMPORTANTE: Permisos necesarios para que el 'git push' funcione
    permissions:
      contents: write

    steps:
      # ─── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─── 2. Timestamp (nombre de carpeta destino) ────────────────────────────
      - name: Set Timestamp
        id: timestamp
        run: echo "folder=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_OUTPUT

      # ─── 3a. Compilar UN archivo ─────────────────────────────────────────────
      - name: Compile Single File
        if: github.event.inputs.resume_file != 'ALL'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: src/${{ github.event.inputs.resume_file }}

      # ─── 3b. Compilar TODOS dinámicamente ────────────────────────────────────
      - name: Compile ALL Files
        if: github.event.inputs.resume_file == 'ALL'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: src/*.tex
          glob_root_file: true # <--- Esto habilita la búsqueda automática de cualquier .tex en src/

      # ─── 4. Verificar que los PDFs existen ──────────────────────────────────
      - name: Verify PDFs were generated
        run: |
          echo "📂 Contenido de src/ después de compilación:"
          ls -la src/
          if ! ls src/*.pdf 1>/dev/null 2>&1; then
            echo "❌ No se encontraron PDFs en src/"
            exit 1
          fi
          echo "✅ PDFs encontrados:"
          ls src/*.pdf

      # ─── 5. Mover PDFs a carpeta timestamped ────────────────────────────────
      - name: Move PDFs to timestamped folder
        run: |
          DEST="resume/${{ steps.timestamp.outputs.folder }}"
          mkdir -p "$DEST"
          cp src/*.pdf "$DEST/"
          echo "✅ PDFs copiados a $DEST:"
          ls "$DEST"

      # ─── 6. Commit y Push ────────────────────────────────────────────────────
      - name: Commit PDFs to repository
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add resume/
          git commit -m "📄 Resume: ${{ github.event.inputs.resume_file }} [${{ steps.timestamp.outputs.folder }}]"
          git push

      # ─── 7. Enviar email con PDF adjunto ─────────────────────────────────────
      - name: Send PDF via Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ CV Generado: ${{ github.event.inputs.resume_file }} [${{ steps.timestamp.outputs.folder }}]"
          to: dylan.naranjo@hotmail.com
          from: GitHub Actions — NDigital Horizon
          body: |
            Hola Joseph,

            La compilación fue exitosa. Adjunto encontrarás el PDF generado.

            Variante  : ${{ github.event.inputs.resume_file }}
            Timestamp : ${{ steps.timestamp.outputs.folder }}
            Guardado  : resume/${{ steps.timestamp.outputs.folder }}/

            El archivo también fue commiteado al repositorio automáticamente.
          attachments: ${{ github.workspace }}/resume/${{ steps.timestamp.outputs.folder }}/*.pdf

      # ─── 8. Notificación de error ────────────────────────────────────────────
      - name: Send Error Report
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ ERROR en compilación LaTeX: ${{ github.event.inputs.resume_file }}"
          to: dylan.naranjo@hotmail.com
          from: GitHub Actions — NDigital Horizon
          body: |
            Atención: El workflow falló al procesar "${{ github.event.inputs.resume_file }}".

            Posibles causas:
            1. Error de sintaxis en el código LaTeX.
            2. Falta algún paquete en /src.
            3. Problema de permisos en git push.

            Logs detallados:
            https://github.com/${{ github.repository }}/actions
